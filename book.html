<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>おもろ図鑑 - 本で読む</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="turn.min.js"></script>
    <style>
      /* =====================
         Design tokens
      ===================== */
      :root {
        --bg: #e6e2d8;
        --page-bg: #fefdf8;
        --text-primary: #1c1c1e;
        --text-secondary: #6e6e73;
        --border: #e0dfd8;
        --c-horror: #8b1c2e;
        --c-daily: #2a6041;
        --c-sf: #1a3d7c;
        --c-romance: #7c2a6a;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 24px;
        padding: 24px 16px 36px;
      }

      /* =====================
         Back link
      ===================== */
      .back-link {
        align-self: flex-start;
        font-size: 0.78rem;
        color: var(--text-secondary);
        text-decoration: none;
        letter-spacing: 0.02em;
        transition: color 0.15s;
      }
      .back-link:hover {
        color: var(--text-primary);
      }

      /* =====================
         Header
      ===================== */
      .header {
        text-align: center;
      }
      .header__title {
        font-size: clamp(1.3rem, 4vw, 1.9rem);
        font-weight: 700;
        letter-spacing: 0.04em;
      }
      .header__subtitle {
        font-size: 0.8rem;
        color: var(--text-secondary);
        margin-top: 4px;
        letter-spacing: 0.02em;
      }

      /* =====================
         Book container
      ===================== */
      #bookContainer {
        display: flex;
        justify-content: center;
        width: 100%;
      }

      #flipbook {
        /* サイズは JS で設定 */
        box-shadow:
          0 24px 64px rgba(0, 0, 0, 0.28),
          0 8px 20px rgba(0, 0, 0, 0.16);
      }

      /* =====================
         Page styling
         turn.js が .page を配置する
      ===================== */
      .page {
        background: var(--page-bg);
        padding: 22px 18px 38px;
        display: block;
        position: relative;
        overflow: hidden;
        will-change: transform;
      }

      /* 偶数ページ = 左ページ → 右端（綴じ目側）に影 */
      .page:nth-child(even) {
        box-shadow:
          inset -16px 0 32px rgba(0, 0, 0, 0.07),
          inset -2px 0 6px rgba(0, 0, 0, 0.04);
      }

      /* 奇数ページ = 右ページ → 左端（綴じ目側）に影 */
      .page:nth-child(odd) {
        box-shadow:
          inset 16px 0 32px rgba(0, 0, 0, 0.07),
          inset 2px 0 6px rgba(0, 0, 0, 0.04);
      }

      /* 画像プレースホルダー */
      .page__media {
        width: 100%;
        aspect-ratio: 4 / 3;
        background: var(--bg);
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.7rem;
        color: var(--text-secondary);
        border: 1.5px dashed var(--border);
        margin-bottom: 10px;
      }

      /* 名前 */
      .page__name {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-primary);
        border-bottom: 1.5px solid var(--border);
        padding-bottom: 4px;
        margin-bottom: 8px;
      }
      .page__name--empty {
        color: var(--border);
      }

      /* カテゴリバッジ */
      .page__category {
        display: inline-block;
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        padding: 2px 8px;
        border-radius: 99px;
        color: #fff;
        margin-bottom: 8px;
      }
      .page__category--horror {
        background: var(--c-horror);
      }
      .page__category--daily {
        background: var(--c-daily);
      }
      .page__category--sf {
        background: var(--c-sf);
      }
      .page__category--romance {
        background: var(--c-romance);
      }

      /* 説明テキスト */
      .page__text {
        font-size: clamp(0.8rem, 2vw, 0.9rem);
        line-height: 1.75;
        color: var(--text-primary);
        overflow: hidden;
      }

      /* ページ番号 */
      .page__num {
        font-size: 0.62rem;
        color: var(--text-secondary);
        text-align: center;
        letter-spacing: 0.08em;
        position: absolute;
        bottom: 12px;
        left: 0;
        right: 0;
      }

      /* =====================
         Navigation
      ===================== */
      .nav {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .nav-btn {
        padding: 10px 28px;
        background: #1c1c1e;
        color: #fff;
        border: none;
        border-radius: 99px;
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition:
          background 0.15s,
          transform 0.1s,
          opacity 0.15s;
      }
      .nav-btn:hover {
        background: #3a3a3c;
      }
      .nav-btn:active {
        transform: scale(0.96);
      }
      .nav-btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none;
      }

      .nav__info {
        font-size: 0.8rem;
        color: var(--text-secondary);
        min-width: 80px;
        text-align: center;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <a class="back-link" href="index.html">← おもろ図鑑へ戻る</a>

    <header class="header">
      <h1 class="header__title">おもろ図鑑</h1>
      <p class="header__subtitle">本をめくって閲覧</p>
    </header>

    <div id="bookContainer">
      <div id="flipbook"></div>
    </div>

    <nav class="nav">
      <button class="nav-btn" id="btnPrev">‹ 前へ</button>
      <span class="nav__info" id="pageInfo">—</span>
      <button class="nav-btn" id="btnNext">次へ ›</button>
    </nav>

    <script>
      /* ====================================================
         仮データ（後で動的に差し替え予定）
         createPageHTML() の引数形式: { id, text, category, name }
      ==================================================== */
      const TOPICS = [
        { id: "h01", text: "一瞬で心を奪い、視線が離れなくなる存在", category: "horror", name: "ミナヅキ" },
        { id: "d01", text: "誰も座っていないのに、ほんのり温かい椅子", category: "daily", name: null },
        { id: "s01", text: "観測するたびに形が微妙に変わる物質", category: "sf", name: "形質Ω" },
        { id: "r01", text: "視線が合うたびに心拍数が上がる、その理由", category: "romance", name: null },
        { id: "h02", text: "近づくと理由もなく不安になる気配", category: "horror", name: "ヌエの気配" },
        { id: "d02", text: "毎朝同じ時刻に止まっている、壊れていない時計", category: "daily", name: null },
      ];

      const CATEGORY_LABELS = {
        horror: "ホラー",
        daily: "日常",
        sf: "SF",
        romance: "乙女",
      };

      /* ====================================================
         ページ HTML を生成（1件 = 1ページ）
         後でデータ連携する際はこの関数の中身を差し替える
      ==================================================== */
      function createPageHTML(topic, pageNum) {
        const label = CATEGORY_LABELS[topic.category] ?? topic.category;
        const nameEl = topic.name ? `<p class="page__name">${topic.name}</p>` : `<p class="page__name page__name--empty">名前なし</p>`;

        return `
          <div class="page" data-id="${topic.id}">
            <div class="page__media">＋ 画像</div>
            ${nameEl}
            <span class="page__category page__category--${topic.category}">${label}</span>
            <p class="page__text">${topic.text}</p>
            <p class="page__num">— ${pageNum} —</p>
          </div>`;
      }

      /* ====================================================
         レスポンシブ寸法
         - PC (≥768px): 見開き、最大 840px
         - スマホ:       シングル、最大 380px
      ==================================================== */
      const PAGE_HEIGHT = 520;

      function isDouble() {
        return window.innerWidth >= 768;
      }

      function bookDims() {
        if (isDouble()) {
          const w = Math.min(window.innerWidth - 80, 840);
          return { width: w, height: PAGE_HEIGHT };
        }
        const w = Math.min(window.innerWidth - 32, 380);
        return { width: w, height: PAGE_HEIGHT };
      }

      /* ====================================================
         ナビゲーション状態の更新
      ==================================================== */
      function updateNav() {
        const $book = $("#flipbook");
        const page = $book.turn("page");
        const total = $book.turn("pages");

        $("#pageInfo").text(`${page} / ${total} ページ`);
        $("#btnPrev").prop("disabled", page <= 1);
        $("#btnNext").prop("disabled", page >= total);
      }

      /* ====================================================
         フリップブック初期化
      ==================================================== */
      function initBook() {
        const $book = $("#flipbook");
        const dims = bookDims();

        // ページを挿入
        $book.empty();
        TOPICS.forEach(function (topic, i) {
          $book.append(createPageHTML(topic, i + 1));
        });

        // turn.js 初期化
        $book.turn({
          width: dims.width,
          height: dims.height,
          autoCenter: true,
          display: isDouble() ? "double" : "single",
          acceleration: true,
          gradients: true,
          elevation: 50,
          when: {
            turned: function () {
              updateNav();
            },
          },
        });

        updateNav();
      }

      /* ====================================================
         ナビゲーション操作
      ==================================================== */
      $("#btnPrev").on("click", function () {
        $("#flipbook").turn("previous");
      });

      $("#btnNext").on("click", function () {
        $("#flipbook").turn("next");
      });

      // キーボード操作（左右矢印キー）
      $(document).on("keydown", function (e) {
        if (e.key === "ArrowLeft") $("#flipbook").turn("previous");
        if (e.key === "ArrowRight") $("#flipbook").turn("next");
      });

      /* ====================================================
         リサイズ対応
         - 150ms デバウンスで display と size を更新
      ==================================================== */
      var resizeTimer;
      $(window).on("resize", function () {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(function () {
          var dims = bookDims();
          $("#flipbook").turn("display", isDouble() ? "double" : "single");
          $("#flipbook").turn("size", dims.width, dims.height);
          updateNav();
        }, 150);
      });

      /* ====================================================
         起動
      ==================================================== */
      $(function () {
        initBook();
      });
    </script>
  </body>
</html>
