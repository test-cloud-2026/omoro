<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>おもろ図鑑</title>
    <!-- Supabase JS クライアント（UMD） -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One&family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Playwrite+NZ+Guides&family=Zen+Maru+Gothic:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="custom.css" />
  </head>
  <body>
    <!-- ヘッダー -->
    <header class="header">
      <h1 class="header__title">OMORO Visual dictionary<br /><span>あなただけのオリジナル図鑑</span></h1>
    </header>

    <div class="notice-block">
      <p>ご注意　このアプリにアップした画像は、他の人に見られることがあります。<br />顔や個人がわかるものは入れないように気をつけてください。</p>
    </div>

    <!-- フィルターバー（JS で生成） -->
    <nav class="filter-bar" id="filterBar" aria-label="カテゴリ選択"></nav>
    <p class="header__subtitle">カテゴリを選んでお題を6つ生成します</p>
    <button class="btn-exit-screenshot" id="btnExitScreenshot">通常モードに戻る</button>

    <!-- カード一覧（Swiperコンテナ） -->
    <div class="swiper" id="cardGrid" aria-live="polite">
      <p class="empty-state">ボタンを押すと<br />6つのお題が表示されます</p>
    </div>

    <!-- 保存セクション（カード表示後のみ表示） -->
    <div class="save-section" id="saveSection" hidden>
      <button class="btn-save" id="btnSave">この作品を保存する</button>
      <p class="save-status" id="saveStatus" hidden></p>
    </div>

    <!-- SNS共有バー（カード表示後のみ表示） -->
    <div class="share-bar" id="shareBar" hidden>
      <a id="btnShareX" class="share-btn share-btn--x" href="#" target="_blank" rel="noopener noreferrer"> X でポスト </a>
      <a id="btnShareLine" class="share-btn share-btn--line" href="#" target="_blank" rel="noopener noreferrer"> LINE で送る </a>
    </div>

    <!-- スクショモード切替ボタン -->
    <button class="btn-screenshot" id="btnScreenshot">スクショモード</button>

    <script src="app.js"></script>
  </body>
</html>
